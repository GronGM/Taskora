name: Taskora CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest

    env:
      APP_NAME: Taskora
      APP_ENV: testing
      APP_DEBUG: false
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_URL: http://localhost
      APP_LOCALE: ru
      APP_FALLBACK_LOCALE: ru
      APP_FAKER_LOCALE: ru_RU
      BETA_ACCESS_ENABLED: false
      BETA_ACCESS_PASSWORD: ""
      BETA_ACCESS_COOKIE_NAME: taskora_beta_access
      TASKORA_PAYMENTS_MODE: stub
      PAYMENT_PROVIDER: stub
      PAYMENT_PROVIDER_MODE: stub
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: log
      FILESYSTEM_DISK: local
      BROADCAST_CONNECTION: log
      LOG_CHANNEL: stack
      LOG_STACK: single

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate --force --no-interaction
          mkdir -p database
          touch database/database.sqlite
          php artisan config:clear

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Run npm audit
        run: npm audit

      - name: Build frontend
        run: npm run build

      - name: Run database migrations and seeders
        run: php artisan migrate:fresh --seed --env=testing --force

      - name: Run Laravel tests
        run: php artisan test

      - name: Check whitespace errors
        run: git diff --check
